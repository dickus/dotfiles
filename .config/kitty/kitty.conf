# vim:fileencoding=utf-8:foldmethod=marker

#: Fonts {{{
font_family      Source Code Pro
bold_font        Source Code Pro Bold
italic_font      Source Code Pro Italic
bold_italic_font Source Code Pro Bold Italic

font_size 11.0
#: }}}

#: Cursor {{{
cursor #E5E9F0
cursor_text_color #3B4252
cursor_shape underline
cursor_underline_thickness 2.0
cursor_blink_interval 0
shell_integration no-cursor #fixes some issues with cursor
#: }}}

#: Misc {{{
url_color #81A1C1

enable_audio_bell no
window_alert_on_bell no

confirm_os_window_close 0
#: }}}

#: Colorscheme {{{
foreground #D8DEE9
background #2E3440

selection_foreground #E5E9F0
selection_background #3B4252

#black
color0 #3B4252
color8 #4C566A

#red
color1 #BF616A
color9 #BF616A

#green
color2  #A3BE8C
color10 #A3BE8C

#yellow
color3  #EBCB8B
color11 #EBCB8B

#blue
color4  #81A1C1
color12 #81A1C1

#magenta
color5  #B48EAD
color13 #B48EAD

#cyan
color6  #88C0D0
color14 #8FBCBB

#white
color7  #E5E9F0
color15 #ECEFF4
#: }}}
